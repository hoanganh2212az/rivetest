<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rive Web Example – Responsive</title>
    <script src="https://unpkg.com/@rive-app/webgl2@latest"></script>
    <style>
      /* Ensure the body takes up the full screen and centers the content */
      body { 
        margin: 0; 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        height: 100vh; 
        background: #333; 
        font-family: sans-serif;
        overflow: hidden; /* Prevents scrollbars on mobile */
      }

      /* Make the canvas responsive */
      canvas { 
        width: 100%; 
        height: 100%; 
        /* Optional: Set a max-width if you don't want it to stretch too far on desktops */
        max-width: 871px; 
        max-height: 100vh;
        display: block;
        border: 1px solid #555; 
        background-color: #000; 
      }
    </style>
  </head>
  <body>
    <canvas id="rive-canvas"></canvas>

    <script>
      const RIVE_FILE_URL = './test.riv';
      const canvas = document.getElementById('rive-canvas');

      const riveInstance = new rive.Rive({
        src: RIVE_FILE_URL,
        canvas: canvas,
        artboard: 'Slot Machine',
        stateMachines: 'State Machine 1',
        autoplay: true,
        autoBind: true,
        // Added Layout to handle responsiveness
        layout: new rive.Layout({
          fit: rive.Fit.Contain, // 'Contain' ensures the whole artboard is visible
          alignment: rive.Alignment.Center,
        }),
        onLoad: () => {
          // Manually trigger a resize on load to ensure the drawing surface matches the CSS
          riveInstance.resizeDrawingSurfaceToCanvas();
          
          const inputs = riveInstance.stateMachineInputs("State Machine 1");
          const vm = riveInstance.viewModelInstance;
        },
      });

      // Listen for window resize events
      window.addEventListener('resize', () => { 
        riveInstance.resizeDrawingSurfaceToCanvas(); 
      });
    </script>
  <script defer src="/_vercel/insights/script.js"></script>
  </body>
</html>
