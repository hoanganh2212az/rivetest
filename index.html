<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rive Web Example – test.riv</title>
    <!-- Rive WebGL2 runtime from CDN (supports Vector Feathering) -->
    <script src="https://unpkg.com/@rive-app/webgl2@latest"></script>
    <style>
      body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #333; font-family: sans-serif; }
      canvas { width: 500px; height: 500px; border: 1px solid #555; background-color: #000; }
    </style>
  </head>
  <body>
    <canvas id="rive-canvas" width="500" height="500"></canvas>
    <script>
      // ⚠️ REPLACE THIS with your own .riv URL ⚠️
      const RIVE_FILE_URL = './test.riv';
      
      // Available Artboards: Slot Machine, Gem, Egg, Star, Heart, Chicken, Spin Button, Start container, Icons, Wheel, Feather Right, Background, Path, Bush Left, Type Score, Bush Right, Feather Left
      const canvas = document.getElementById('rive-canvas');
      // State Machine Inputs (this state machine has no inputs, but here's the pattern)

      const riveInstance = new rive.Rive({
        src: RIVE_FILE_URL,
        canvas: canvas,
        artboard: 'Slot Machine',
        stateMachines: 'State Machine 1',
        autoplay: true,
        autoBind: true, // Enable Data Binding
        onLoad: () => {
          // Initialize inputs for state machine: "State Machine 1"
          const inputs = riveInstance.stateMachineInputs("State Machine 1");
          if (inputs) {
            // Example: If this state machine had inputs, you would access them like this:
            // const myInput = inputs.find(i => i.name === "inputName");
            // if (myInput) {
            //   myInput.value = 1.0;  // For number/boolean inputs
            //   myInput.fire();       // For trigger inputs
            // }
          }

          // =========================================================
          // 🧠 Data Binding (View Model)
          // =========================================================
          const vm = riveInstance.viewModelInstance;
          if (vm) {

            // Usage Examples:
            // chicken.value = 100;
          }
        },
      });
      window.addEventListener('resize', () => { riveInstance.resizeDrawingSurfaceToCanvas(); });
    </script>
  </body>
</html>
